name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: [latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Install libnghttp2 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libnghttp2-dev

      - name: Install libnghttp2 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libnghttp2
          echo "LIBRARY_PATH=$(brew --prefix libnghttp2)/lib" >> $GITHUB_ENV

      - name: Install shards
        run: shards install --without-development

      - name: Run specs
        run: crystal spec

      - name: Build examples
        run: |
          find examples -name "*.cr" | sort | while read f; do
            echo "Building $f ..."
            crystal build --no-codegen "$f"
          done

      - name: Check formatting
        run: crystal tool format --check

  e2e-grpcurl:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: [latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Install libnghttp2 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libnghttp2-dev

      - name: Install libnghttp2 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libnghttp2
          echo "LIBRARY_PATH=$(brew --prefix libnghttp2)/lib" >> $GITHUB_ENV

      - name: Install grpcurl (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          tag="$(basename "$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/fullstorydev/grpcurl/releases/latest)")"
          ver="${tag#v}"
          curl -fL -o /tmp/grpcurl.tgz \
            "https://github.com/fullstorydev/grpcurl/releases/download/${tag}/grpcurl_${ver}_linux_x86_64.tar.gz"
          tar -xzf /tmp/grpcurl.tgz -C /tmp grpcurl
          sudo install -m 0755 /tmp/grpcurl /usr/local/bin/grpcurl
          grpcurl -version

      - name: Install grpcurl (macOS)
        if: runner.os == 'macOS'
        run: brew install grpcurl

      - name: Install shards
        run: shards install --without-development

      - name: Run grpcurl E2E tests
        run: crystal spec spec/grpcurl.cr

  e2e-gripmock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install libnghttp2 (Ubuntu)
        run: sudo apt-get install -y libnghttp2-dev

      - name: Start GripMock
        run: |
          docker run -d --name gripmock \
            -p 4770:4770 \
            -p 4771:4771 \
            -v "$PWD/spec/fixtures/grpcurl:/proto:ro" \
            tkpd/gripmock:latest \
            -grpc-listen 0.0.0.0 \
            -admin-listen 0.0.0.0 \
            /proto/e2e.proto

      - name: Wait for GripMock ports
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/4770) >/dev/null 2>&1 && \
               (echo > /dev/tcp/127.0.0.1/4771) >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs gripmock || true
          exit 1

      - name: Install shards
        run: shards install --without-development

      - name: Run GripMock E2E tests
        run: crystal spec spec/gripmock.cr

      - name: Print GripMock logs on failure
        if: failure()
        run: docker logs gripmock

      - name: Stop GripMock
        if: always()
        run: docker rm -f gripmock || true
