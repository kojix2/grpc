syntax = "proto3";
package e2e;

import "common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ComplexProbe {
  rpc GetComplex(google.protobuf.Empty) returns (ComplexReply);
}

message ComplexReply {
  map<string, string> labels = 1;

  oneof choice {
    string name = 2;
    int32 code = 3;
  }

  Nested nested = 4;
  ImportedMessage imported = 5;
  google.protobuf.Timestamp created_at = 6;

  message Nested {
    enum Mode {
      MODE_UNSPECIFIED = 0;
      MODE_ACTIVE = 1;
    }

    Mode mode = 1;
  }
}